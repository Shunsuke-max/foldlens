services:
  - type: web
    name: foldlens
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: OPENAI_MODEL
        value: gpt-5.6-sol
      - key: ANALYSIS_TIMEOUT_MS
        value: 12000
      - key: OPENAI_API_KEY
        sync: false
      - key: MOCK_ANALYSIS
        value: "false"
      - key: ANALYSIS_RATE_LIMIT_MAX
        value: "20"
      - key: ANALYSIS_RATE_LIMIT_WINDOW_MS
        value: "3600000"
